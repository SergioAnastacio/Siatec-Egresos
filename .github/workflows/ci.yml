name: CI

on:
  pull_request:
  push:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-js:
    name: Validate (JS/TS)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Needed for Turbo "... [origin/main]" comparisons on PRs
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-

      - name: Validate (affected only on PR)
        if: ${{ github.event_name == 'pull_request' }}
        run: pnpm validate -- --filter=...[origin/main]

      - name: Validate (full on push)
        if: ${{ github.event_name != 'pull_request' }}
        run: pnpm validate

  rust-api:
    name: Rust API (fmt/clippy/test/build)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/api/target
          key: cargo-${{ runner.os }}-${{ hashFiles('services/api/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: cargo fmt
        working-directory: services/api
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: services/api
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        working-directory: services/api
        run: cargo test --all-features

      - name: cargo build
        working-directory: services/api
        run: cargo build --release
